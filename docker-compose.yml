services:
  dev:
    build:
      context: .
      target: builder
    image: tempcheck:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: bash

  test:
    build:
      context: .
      target: builder
    image: tempcheck:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: cargo test --all-features

  lint:
    build:
      context: .
      target: builder
    image: tempcheck:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: bash -c "cargo fmt --check && cargo clippy --all-targets --all-features -- -D warnings"

  coverage:
    build:
      context: .
      target: builder
    image: tempcheck:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: bash -c "rustup component add llvm-tools-preview 2>/dev/null; cargo install cargo-llvm-cov --locked 2>/dev/null || true; cargo llvm-cov --all-features --summary-only"

  daemon:
    build: .
    image: tempcheck:latest
    volumes:
      - tempcheck-data:/data
      - tempcheck-logs:/var/log/tempcheck
    devices:
      - /sys/class/thermal:/sys/class/thermal:ro
    command: ["daemon", "--db", "/data/tempcheck.db", "--interval-secs", "30"]

volumes:
  tempcheck-data:
  tempcheck-logs:
